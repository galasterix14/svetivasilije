<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Распоред Служби – Св. Василије Велики у Хелсингборгу</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div id="page-wrapper">
    <header id="site-header"></header>
    <div id="body-layout">
      <nav id="site-nav"></nav>
      <main id="main-content">
        <div class="page-heading">
          <span class="heading-cross"></span>
          <h2>Распоред Служби</h2>
        </div>
        <!-- Add your content here -->
        <div id="schedule-container">
          <p style="color:#aaa; font-style:italic;">Учитавање распореда...</p>
        </div>

        <script>
        (function() {
          const MONTHS = {
            '01': 'Јануар', '02': 'Фебруар', '03': 'Март',
            '04': 'Април',  '05': 'Мај',     '06': 'Јуни',
            '07': 'Јули',   '08': 'Август',  '09': 'Септембар',
            '10': 'Октобар','11': 'Новембар', '12': 'Децембар'
          };

          const DAYS = ['Недеља','Понедељак','Уторак','Среда','Четвртак','Петак','Субота'];

          function loadSchedule() {
            const container = document.getElementById('schedule-container');
            if (!container) return;

            const data = window.SCHEDULE_DATA || [];
            const currentYear = new Date().getFullYear();

            const entries = data
              .filter(e => e.date && e.service_sr && parseInt(e.date.slice(0,4)) === currentYear)
              .map(e => ({ date: e.date, service: e.service_sr, time: e.time }));

            if (entries.length === 0) {
              container.innerHTML = '<p style="color:#aaa; font-style:italic;">Laddar schema...</p>';
              return;
            }

            const byMonth = {};
            entries.forEach(e => {
              const month = e.date.slice(5, 7);
              if (!byMonth[month]) byMonth[month] = [];
              byMonth[month].push(e);
            });

            let html = '';
            Object.keys(byMonth).sort().forEach(month => {
              html += `<div class="schedule-month">${MONTHS[month] || month}</div>`;
              html += `
                <div class="schedule-table-wrap">
                  <table class="schedule-table">
                    <thead>
                      <tr>
                        <th>Датум</th>
                        <th>Дан</th>
                        <th>Богослужење</th>
                        <th>Почетак</th>
                      </tr>
                    </thead>
                    <tbody>`;

              byMonth[month].forEach(e => {
                const day     = e.date.slice(8, 10);
                const dayName = DAYS[new Date(e.date).getDay()];
                html += `<tr>
                  <td>${day}</td>
                  <td>${dayName}</td>
                  <td>${e.service}</td>
                  <td>${e.time}</td>
                </tr>`;
              });

              html += `</tbody></table></div>`;
            });

            container.innerHTML = html;
          }

          window.loadFullScheduleSr = loadSchedule;
        })();
        </script>
      </main>
      <aside id="right-sidebar"></aside>
    </div>
    <footer id="site-footer"></footer>
  </div>
  <script>
    const LANG         = 'sr';
    const CURRENT_PAGE = 'raspored';
  </script>
  <script src="../js/nav.js"></script>
</body>
</html>
